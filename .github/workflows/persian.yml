name: Build Persian Version

on:
  push:
    branches: [ "persian" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --icon=icon.ico --name="مدیریت مالی" code/main_fa.py
        
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: FinancialManager-Persian
        path: dist/مدیریت مالی.exe